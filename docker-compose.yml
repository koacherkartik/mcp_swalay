services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DATABASE_NAME: military
      OLLAMA_HOST: http://ollama:11434

volumes:
  mongo_data:
  ollama: